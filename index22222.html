<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Anime Vibe Repo</title>
</head>
<body class="bg-slate-950 text-white p-10">
    <h1 class="text-4xl font-bold mb-10">인생 애니메이션 50선</h1>
    
    <div id="tabs" class="flex gap-3 mb-10">
        <button onclick="renderAnime('fantasy')" class="bg-blue-600 px-4 py-2 rounded-lg">판타지</button>
        <button onclick="renderAnime('sf')" class="bg-purple-600 px-4 py-2 rounded-lg">SF</button>
        <button onclick="renderAnime('drama')" class="bg-pink-600 px-4 py-2 rounded-lg">드라마</button>
        <button onclick="renderAnime('slice')" class="bg-emerald-600 px-4 py-2 rounded-lg">일상/치유</button>
        <button onclick="renderAnime('growth')" class="bg-orange-600 px-4 py-2 rounded-lg">성장/열정</button>
    </div>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>

    <script src="data.js"></script>
    
    <script>
        function renderAnime(category) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            // 데이터 확인
            if(!animeData[category]) return;

            // 리스트 렌더링
            animeData[category].forEach(item => {
                grid.innerHTML += `
                    <div class="bg-slate-900 rounded-2xl overflow-hidden hover:scale-105 transition cursor-pointer" 
                         onclick="alert('${item.desc}')">
                        <img src="${item.img}" class="w-full h-64 object-cover" 
                             onerror="this.src='https://placehold.co/400x600?text=No+Image'"> 
                        <div class="p-4">
                            <h3 class="font-bold truncate text-sm">${item.title}</h3>
                        </div>
                    </div>
                `;
            });
        }

        // 초기 화면 설정 (판타지 먼저 출력)
        renderAnime('fantasy');
    </script>
</body>
</html>
